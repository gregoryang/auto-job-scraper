name: LinkedIn Job Scraper to Google Sheets

on:
  schedule:
    # Native timezone scheduling — no manual UTC math needed.
    #   - Mon/Wed/Fri 10am SGT (Tab 1a, keyword search)
    #   - Mondays 10am SGT (Tab 2a, target company scrape)
    # Monday fires both crons → two separate workflow runs that day, each
    # gated by its own `if` condition below, so Tab 1a and Tab 2a both run
    # without duplicating each other's work.
    - cron: "0 10 * * 1,3,5"
      timezone: "Asia/Singapore"
    - cron: "0 10 * * 1"
      timezone: "Asia/Singapore"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Ensure data dir exists
        run: mkdir -p data

      - name: Tab 1a — Keyword scrape (Mon/Wed/Fri 10am SGT)
        if: ${{ github.event.schedule == '0 10 * * 1,3,5' || github.event_name == 'workflow_dispatch' }}
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/tab1_keyword_scraper.py

      - name: Tab 2a — Target company scrape (Mondays 10am SGT)
        if: ${{ github.event.schedule == '0 10 * * 1' || github.event_name == 'workflow_dispatch' }}
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/tab3_company_scraper.py

      - name: Send notification email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
        run: python scripts/send_notification.py

      - name: Clean up count files
        run: rm -f data/tab1_count.txt data/tab3_count.txt
